<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aparato Dental</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">

    <!-- VISTA PRINCIPAL -->
    <div id="view-main">
      <header>
        <h1>🦷</h1>
        <p class="today-label" id="today-date"></p>
      </header>

      <div class="today-status" id="today-status-msg"></div>

      <div class="today-options">
        <button class="option-btn" data-value="0">
          <span class="option-icon">😬</span>
          <span class="option-text">Menos de 4h</span>
        </button>
        <button class="option-btn" data-value="1">
          <span class="option-icon">😐</span>
          <span class="option-text">Menos de 8h</span>
        </button>
        <button class="option-btn" data-value="2">
          <span class="option-icon">🙂</span>
          <span class="option-text">Menos de 12h</span>
        </button>
        <button class="option-btn" data-value="3">
          <span class="option-icon">😁</span>
          <span class="option-text">Más de 12h</span>
        </button>
      </div>
      <button class="option-btn option-wide" data-value="5">
        <span class="option-icon">🌙</span>
        <span class="option-text">Solo por la noche</span>
      </button>
      <button class="option-btn option-none" data-value="4">
        <span class="option-icon">❌</span>
        <span class="option-text">No me lo he puesto nada</span>
      </button>

      <button class="stats-toggle-btn" id="stats-toggle-btn">
        Ver estadísticas ↓
      </button>
    </div>

    <!-- VISTA ESTADÍSTICAS -->
    <div id="view-stats" class="hidden">
      <div class="stats-header">
        <button class="back-btn" id="back-btn">← Volver</button>
        <h2 class="stats-title">Estadísticas</h2>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-streak">0</div>
          <div class="stat-label">Racha actual<br><small>días ≥12h</small></div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-best-streak">0</div>
          <div class="stat-label">Mejor racha<br><small>días ≥12h</small></div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">Días<br><small>registrados</small></div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-good-pct">0%</div>
          <div class="stat-label">Cumplimiento<br><small>días ≥12h</small></div>
        </div>
      </div>

      <div class="chart-row">
        <div class="panel">
          <h3>Distribución</h3>
          <div class="bar-chart" id="bar-chart"></div>
        </div>
        <div class="panel">
          <h3>Últimos 6 meses</h3>
          <div id="monthly-summary"></div>
        </div>
      </div>

      <div class="panel">
        <div class="grid-header">
          <h3>Últimos 30 días</h3>
          <div class="legend">
            <span class="legend-item"><span class="dot dot-0"></span>&lt;4h</span>
            <span class="legend-item"><span class="dot dot-1"></span>&lt;8h</span>
            <span class="legend-item"><span class="dot dot-2"></span>&lt;12h</span>
            <span class="legend-item"><span class="dot dot-3"></span>≥12h</span>
            <span class="legend-item"><span class="dot dot-5"></span>Noche</span>
          <span class="legend-item"><span class="dot dot-4"></span>Nada</span>
          <span class="legend-item"><span class="dot dot-empty"></span>Sin dato</span>
          </div>
        </div>
        <div class="calendar-grid" id="calendar-grid"></div>
      </div>
    </div>

  </div>

  <div class="tooltip" id="tooltip"></div>
  <script src="app.js"></script>
</body>
</html>
