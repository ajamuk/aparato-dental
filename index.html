<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aparato Dental - Seguimiento</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🦷 Aparato Dental</h1>
      <p class="subtitle">Seguimiento diario de uso</p>
    </header>

    <section class="today-section">
      <h2>Hoy — <span id="today-date"></span></h2>
      <div class="today-options">
        <button class="option-btn" data-value="0" data-label="&lt;4h">
          <span class="option-icon">😬</span>
          <span class="option-text">Menos de 4h</span>
        </button>
        <button class="option-btn" data-value="1" data-label="&lt;8h">
          <span class="option-icon">😐</span>
          <span class="option-text">Menos de 8h</span>
        </button>
        <button class="option-btn" data-value="2" data-label="&lt;12h">
          <span class="option-icon">🙂</span>
          <span class="option-text">Menos de 12h</span>
        </button>
        <button class="option-btn" data-value="3" data-label="&gt;12h">
          <span class="option-icon">😁</span>
          <span class="option-text">Más de 12h</span>
        </button>
      </div>
    </section>

    <section class="stats-section">
      <h2>Estadísticas</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-streak">0</div>
          <div class="stat-label">Racha actual<br><small>días ≥12h</small></div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-best-streak">0</div>
          <div class="stat-label">Mejor racha<br><small>días ≥12h</small></div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">Días<br><small>registrados</small></div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-good-pct">0%</div>
          <div class="stat-label">Días con<br><small>≥12h</small></div>
        </div>
      </div>

      <div class="chart-row">
        <div class="bar-chart-wrapper">
          <h3>Distribución</h3>
          <div class="bar-chart" id="bar-chart"></div>
        </div>
        <div class="monthly-summary-wrapper">
          <h3>Este mes</h3>
          <div id="monthly-summary"></div>
        </div>
      </div>
    </section>

    <section class="grid-section">
      <div class="grid-header">
        <h2>Historial</h2>
        <div class="legend">
          <span class="legend-item"><span class="dot dot-0"></span> &lt;4h</span>
          <span class="legend-item"><span class="dot dot-1"></span> &lt;8h</span>
          <span class="legend-item"><span class="dot dot-2"></span> &lt;12h</span>
          <span class="legend-item"><span class="dot dot-3"></span> ≥12h</span>
          <span class="legend-item"><span class="dot dot-empty"></span> Sin dato</span>
        </div>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
